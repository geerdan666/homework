<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/style.css" />
    <script src="./js/main.js" defer></script>
    <title>Todo</title>
  </head>
  <body class="body">
    <section class="todo body__todo">
      <h1 class="todo__title">Список дел</h1>
      <div class="todo__new-task">
        <input class="todo__input" type="text" placeholder="Добавить задачу" />
        <button
          class="todo__button"
          type="button"
          aria-label="Добавить задачу"
        ></button>
      </div>
      <ul class="todo__tasks-list"></ul>
    </section>
  </body>
</html>
